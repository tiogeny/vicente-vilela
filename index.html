<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ÑOKI 🎮</title>
<style>
 
body {

margin: 0;

font-family: Arial;

background: linear-gradient(135deg, #ff00cc, #3333ff);

color: white;

text-align: center;

}
 
/* TITULO */

h1 {

margin: 20px;

font-size: 40px;

text-shadow: 0 0 20px #fff;

}
 
/* MENU */

#menu {

display: flex;

justify-content: center;

flex-wrap: wrap;

gap: 20px;

}
 
.card {

background: linear-gradient(135deg, #222, #444);

padding: 20px;

border-radius: 15px;

width: 170px;

cursor: pointer;

transition: 0.3s;

box-shadow: 0 0 15px #000;

}
 
.card:hover {

transform: scale(1.1);

box-shadow: 0 0 25px #fff;

}
 
/* GAME */

#gameContainer {

display: none;

}
 
canvas {

background: black;

border: 4px solid white;

margin-top: 10px;

box-shadow: 0 0 20px white;

}
 
button {

padding: 10px;

margin: 10px;

border: none;

border-radius: 8px;

background: white;

cursor: pointer;

}
 
</style>
</head>
<body>
 
<h1>🎮 ÑOKI</h1>
 
<div id="menu">
<div class="card" onclick="openGame('snake')">🐍 Snake</div>
<div class="card" onclick="openGame('pong')">🏓 Pong</div>
<div class="card" onclick="openGame('breakout')">🟦 Breakout</div>
<div class="card" onclick="openGame('clicker')">🎯 Clicker</div>
<div class="card" onclick="openGame('dodge')">🟥 Dodge</div>
</div>
 
<div id="gameContainer">
<button onclick="goBack()">⬅ Volver</button>
<h2 id="gameTitle"></h2>
<canvas id="game" width="400" height="400"></canvas>
</div>
 
<script>
 
const menu = document.getElementById("menu");

const gameContainer = document.getElementById("gameContainer");

const title = document.getElementById("gameTitle");

const canvas = document.getElementById("game");

const ctx = canvas.getContext("2d");
 
let loop;

let currentGame = "";
 
/* ===== MENU ===== */

function openGame(game) {

currentGame = game;

menu.style.display = "none";

gameContainer.style.display = "block";

clearInterval(loop);
 
if (game === "snake") startSnake();

if (game === "pong") startPong();

if (game === "breakout") startBreakout();

if (game === "clicker") startClicker();

if (game === "dodge") startDodge();

}
 
function goBack() {

gameContainer.style.display = "none";

menu.style.display = "flex";

clearInterval(loop);

}
 
/* ===== DODGE (NUEVO JUEGO) ===== */

let playerX, enemies, score, speed;
 
function startDodge() {

title.textContent = "🟥 Dodge";
 
playerX = 180;

enemies = [];

score = 0;

speed = 3;
 
/* controles */

document.onkeydown = e => {

if ((e.key === "ArrowLeft" || e.key === "a") && playerX > 0) {

playerX -= 20;

}

if ((e.key === "ArrowRight" || e.key === "d") && playerX < 360) {

playerX += 20;

}

};
 
/* loop */

loop = setInterval(() => {
 
/* crear enemigos */

if (Math.random() < 0.05) {

enemies.push({

x: Math.random() * 360,

y: -40

});

}
 
/* mover enemigos */

enemies.forEach(e => e.y += speed);
 
/* colisiones */

enemies.forEach(e => {

if (

e.x < playerX + 40 &&

e.x + 40 > playerX &&

e.y < 390 &&

e.y + 40 > 360

) {

alert("💀 Game Over! Puntos: " + score);

goBack();

}

});
 
/* limpiar enemigos */

enemies = enemies.filter(e => {

if (e.y > 400) {

score++;

if (score % 5 === 0) speed += 0.5;

return false;

}

return true;

});
 
/* dibujar */

ctx.fillStyle = "black";

ctx.fillRect(0,0,400,400);
 
/* jugador */

ctx.fillStyle = "lime";

ctx.fillRect(playerX,360,40,40);
 
/* enemigos */

ctx.fillStyle = "red";

enemies.forEach(e => ctx.fillRect(e.x,e.y,40,40));
 
/* score */

ctx.fillStyle = "white";

ctx.font = "20px Arial";

ctx.fillText("Score: " + score, 10, 25);
 
}, 20);

}
 
/* ===== SNAKE ===== */

let snake, direction, food, size = 20;

function startSnake() {

title.textContent = "🐍 Snake";

snake = [{x: 200, y: 200}];

direction = "RIGHT";

food = {x: 100, y: 100};
 
document.onkeydown = e => {

if (e.key === "ArrowUp") direction = "UP";

if (e.key === "ArrowDown") direction = "DOWN";

if (e.key === "ArrowLeft") direction = "LEFT";

if (e.key === "ArrowRight") direction = "RIGHT";

};
 
loop = setInterval(() => {

let head = {...snake[0]};

if (direction === "UP") head.y -= size;

if (direction === "DOWN") head.y += size;

if (direction === "LEFT") head.x -= size;

if (direction === "RIGHT") head.x += size;
 
snake.unshift(head);
 
if (head.x === food.x && head.y === food.y) {

food.x = Math.floor(Math.random()*20)*size;

food.y = Math.floor(Math.random()*20)*size;

} else {

snake.pop();

}
 
if (head.x < 0 || head.y < 0 || head.x >= 400 || head.y >= 400) {

alert("Game Over");

goBack();

}
 
ctx.fillStyle = "black";

ctx.fillRect(0,0,400,400);
 
ctx.fillStyle = "lime";

snake.forEach(s=>ctx.fillRect(s.x,s.y,size,size));
 
ctx.fillStyle = "red";

ctx.fillRect(food.x,food.y,size,size);
 
},100);

}
 
/* ===== PONG ===== */

let paddleY, ballX, ballY, vx, vy;

function startPong() {

title.textContent = "🏓 Pong";

paddleY = 150;

ballX = 200;

ballY = 200;

vx = 4; vy = 3;
 
document.onmousemove = e => paddleY = e.offsetY;
 
loop = setInterval(()=>{

ballX += vx;

ballY += vy;
 
if (ballY <= 0 || ballY >= 400) vy *= -1;
 
if (ballX < 20 && ballY > paddleY && ballY < paddleY+80) vx *= -1;
 
if (ballX < 0) {

alert("Perdiste");

goBack();

}
 
ctx.fillStyle="black";

ctx.fillRect(0,0,400,400);
 
ctx.fillRect(10,paddleY,10,80);
 
ctx.beginPath();

ctx.arc(ballX,ballY,8,0,Math.PI*2);

ctx.fill();
 
},30);

}
 
/* ===== BREAKOUT ===== */

let bricks, bx, by, bvx, bvy;

function startBreakout() {

title.textContent = "🟦 Breakout";
 
bx=200; by=200; bvx=3; bvy=3;
 
bricks = Array.from({length:20}, (_,i)=>({

x:(i%5)*80,

y:Math.floor(i/5)*30

}));
 
loop = setInterval(()=>{

bx+=bvx;

by+=bvy;
 
if(by<0) bvy*=-1;

if(bx<0||bx>400) bvx*=-1;
 
bricks = bricks.filter(b=>{

if(bx>b.x && bx<b.x+70 && by>b.y && by<b.y+20){

bvy*=-1;

return false;

}

return true;

});
 
if(by>400){

alert("Perdiste");

goBack();

}
 
ctx.fillStyle="black";

ctx.fillRect(0,0,400,400);
 
ctx.fillStyle="cyan";

bricks.forEach(b=>ctx.fillRect(b.x,b.y,70,20));
 
ctx.beginPath();

ctx.arc(bx,by,8,0,Math.PI*2);

ctx.fill();
 
},30);

}
 
/* ===== CLICKER ===== */

let clicks;

function startClicker() {

title.textContent = "🎯 Clicker";

clicks = 0;
 
canvas.onclick = () => clicks++;
 
loop = setInterval(()=>{

ctx.fillStyle="black";

ctx.fillRect(0,0,400,400);
 
ctx.fillStyle="white";

ctx.font="30px Arial";

ctx.fillText("Clicks: "+clicks,120,200);
 
},30);

}
 
</script>
</body>
</html>
